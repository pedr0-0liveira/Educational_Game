<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado - Desafio Técnico</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .info-topo { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        
        .quiz-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        
        .pergunta { font-size: 1.2em; margin-bottom: 20px; font-weight: bold; color: #333; }
        
        .opcoes { display: grid; gap: 10px; }
        
        .btn-opcao { padding: 15px; border: 2px solid #007bff; border-radius: 8px; background: none; cursor: pointer; transition: 0.3s; text-align: left; font-size: 1em; }
        
        .btn-opcao:hover { background: #e7f3ff; border-color: #0056b3; }

        /* Animação de Acerto (Pulso Verde) */
@keyframes acerto-anim {
    0% { transform: scale(1); background-color: white; }
    50% { transform: scale(1.05); background-color: #28a745; color: white; }
    100% { transform: scale(1); background-color: #28a745; color: white; }
}

/* Animação de Erro (Tremidinha Vermelha) */
@keyframes erro-anim {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); background-color: #ff4d4d; color: white; }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); background-color: #ff4d4d; color: white; }
}

.opcao-correta {
    animation: acerto-anim 0.5s ease forwards;
    border-color: #28a745 !important;
}

.opcao-errada {
    animation: erro-anim 0.4s ease forwards;
    border-color: #dc3545 !important;
}

/* Trava os botões após o clique para o usuário não clicar duas vezes */
.travado {
    pointer-events: none;
}
    </style>
</head>
<body>

    <div class="info-topo">
        <span id="contador-questoes">Questão: 0/0</span>
        <span id="xp-ganho" style="color: #28a745;">XP: 0</span>
    </div>

    <div class="quiz-container">
        <div class="pergunta" id="texto-pergunta">Carregando pergunta...</div>
        <div class="opcoes" id="caixa-opcoes">
            </div>
    </div>

    <script src="questoes.js"></script>
    <script src="logica-quiz.js"></script>
</body>
</html>
