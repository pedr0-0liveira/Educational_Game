<style>
    .grid-tabuadas { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
    .tabuada-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    .tabuada-card h3 { margin-top: 0; color: #58cc02; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
    .linha { padding: 3px 0; border-bottom: 1px solid #fafafa; font-size: 0.9em; }
</style>

<div class="grid-tabuadas" id="lista-tabuadas"></div>

<script>
    const container = document.getElementById('lista-tabuadas');
    for (let i = 1; i <= 10; i++) {
        let html = `<div class="tabuada-card"><h3>Tabuada do ${i}</h3>`;
        for (let j = 1; j <= 10; j++) {
            html += `<div class="linha">${i} x ${j} = <strong>${i * j}</strong></div>`;
        }
        html += `</div>`;
        container.innerHTML += html;
    }
</script>
