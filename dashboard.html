<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Meu Futuro Técnico</title>
    <style>
        :root {
            --primary: #007bff;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --success: #28a745;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: #f4f7f6;
        }

        /* --- BARRA LATERAL --- */
        .sidebar {
            width: 260px;
            background: var(--dark);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar h2 { 
            font-size: 1.2em; 
            border-bottom: 1px solid #34495e; 
            padding-bottom: 20px; 
            text-align: center;
        }

        .menu-item {
            padding: 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .menu-item:hover { background: #34495e; }
        .menu-item.active { background: var(--primary); }

        .logout-btn {
            margin-top: auto;
            background: #e74c3c;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header-home {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* --- STATS E CARDS --- */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card, .ranking-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .bar-bg { background: #eee; height: 10px; border-radius: 5px; margin-top: 10px; }
        .bar-fill { height: 100%; border-radius: 5px; transition: 0.5s; }

        /* --- RANKING --- */
        .ranking-card { margin-top: 25px; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
        }
        .ranking-item.voce {
            background: #e7f3ff;
            font-weight: bold;
            border-radius: 8px;
            border-bottom: none;
        }
        .posicao { width: 35px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🚀 Futuro Técnico</h2>
    <div class="menu-item active" onclick="location.reload()">🏠 Home</div>
    <div class="menu-item" onclick="window.location.href='selecao-materia.html'">📝 Simulados</div>
    <div class="logout-btn" onclick="sair()">Sair</div>
</div>

<div class="main-content">
    <div class="header-home">
        <h2 id="boas-vindas">Olá, Estudante!</h2>
        <div id="status-nivel" style="background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px;">Nível 1</div>
    </div>

    <div class="xp-container" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <strong>Progresso de Experiência</strong>
        <div class="progress-bar" style="background: #e0e0e0; border-radius: 20px; height: 15px; margin: 10px 0; overflow: hidden;">
            <div class="progress-fill" id="barra-xp" style="background: var(--success); height: 100%; width: 0%;"></div>
        </div>
        <small id="xp-texto">0 XP</small>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <strong>📊 Matemática</strong>
            <div class="bar-bg"><div id="bar-mat" class="bar-fill" style="background: #3498db; width: 0%;"></div></div>
            <small id="text-mat">Acertos: 0%</small>
        </div>
        <div class="stat-card">
            <strong>📚 Português</strong>
            <div class="bar-bg"><div id="bar-port" class="bar-fill" style="background: #9b59b6; width: 0%;"></div></div>
            <small id="text-port">Acertos: 0%</small>
        </div>
    </div>

    <div class="ranking-card">
        <h3 style="margin-top: 0;">🏆 Ranking da Turma</h3>
        <div id="lista-ranking">
            </div>
    </div>

    <h3 style="margin-top: 40px;">Ações Rápidas</h3>
    <div class="card" onclick="window.location.href='selecao-materia.html'" style="background: white; padding: 25px; border-radius: 12px; text-align: center; cursor: pointer; border-bottom: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s;">
        <h3 style="margin: 0;">📝 Ir para Simulados</h3>
        <p style="color: #666; margin-top: 10px;">Escolha uma matéria e comece a treinar.</p>
    </div>
</div>

<script>
function carregarDashboard() {
    const usuario = localStorage.getItem('usuarioSalvo') || "Estudante";
    let xp = parseInt(localStorage.getItem('xpUsuario') || "0");
    let stats = JSON.parse(localStorage.getItem('statsUsuario')) || {
        Matematica: { acertos: 0, total: 0 },
        Portugues: { acertos: 0, total: 0 }
    };

    // 1. Atualiza Boas-vindas e XP
    document.getElementById('boas-vindas').innerText = `Olá, ${usuario}! 👋`;
    let nivel = Math.floor(xp / 100) + 1;
    document.getElementById('status-nivel').innerText = `Nível ${nivel}`;
    document.getElementById('barra-xp').style.width = (xp % 100) + "%";
    document.getElementById('xp-texto').innerText = `${xp} XP total`;

    // 2. Gráficos de Desempenho
    const calcPerc = (materia) => {
        if (!stats[materia] || stats[materia].total === 0) return 0;
        return Math.round((stats[materia].acertos / stats[materia].total) * 100);
    };

    let percMat = calcPerc('Matematica');
    document.getElementById('bar-mat').style.width = percMat + "%";
    document.getElementById('text-mat').innerText = `Acertos: ${percMat}% (${stats.Matematica.acertos} questões)`;

    let percPort = calcPerc('Portugues');
    document.getElementById('bar-port').style.width = percPort + "%";
    document.getElementById('text-port').innerText = `Acertos: ${percPort}% (${stats.Portugues.acertos} questões)`;

    // 3. Lógica do Ranking
    const listaRanking = document.getElementById('lista-ranking');
    const competidores = [
        { nome: "Ana Silva", xp: 550 },
        { nome: "Carlos Souza", xp: 420 },
        { nome: usuario, xp: xp, voce: true },
        { nome: "Beatriz Oliveira", xp: 210 }
    ];

    competidores.sort((a, b) => b.xp - a.xp);

    listaRanking.innerHTML = competidores.map((c, index) => `
        <div class="ranking-item ${c.voce ? 'voce' : ''}">
            <span><span class="posicao">${index + 1}º</span> ${c.nome}</span>
            <span>${c.xp} XP</span>
        </div>
    `).join('');
}

function sair() {
    localStorage.removeItem('usuarioSalvo');
    window.location.href = "index.html";
}

// Inicializa o dashboard ao carregar
window.onload = carregarDashboard;
</script>
</body>
</html>
