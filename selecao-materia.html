<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha a Matéria - Meu Futuro Técnico</title>
    <style>
        :root {
            --primary: #007bff;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --success: #28a745;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: #f4f7f6;
        }

        /* --- SIDEBAR REAPROVEITADA --- */
        .sidebar {
            width: 260px;
            background: var(--dark);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar h2 { 
            font-size: 1.2em; 
            border-bottom: 1px solid #34495e; 
            padding-bottom: 20px; 
            text-align: center;
        }

        .menu-item {
            padding: 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .menu-item:hover { background: #34495e; }
        .menu-item.active { background: var(--primary); }

        .logout-btn {
            margin-top: auto;
            background: #e74c3c;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
        }

        /* --- CONTEÚDO --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .grid-selecao {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
            max-width: 1000px;
        }

        /* --- CARDS DE MATÉRIA ESTILIZADOS --- */
        .card-materia {
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 8px solid var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-materia:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }

        .card-materia h3 { 
            font-size: 1.8em; 
            margin: 15px 0 10px 0; 
            color: var(--dark);
        }

        .card-materia p {
            color: #666;
            margin: 0;
            font-size: 0.95em;
        }

        .icon-materia {
            font-size: 3em;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🚀 Futuro Técnico</h2>
        <div class="menu-item" onclick="window.location.href='dashboard.html'">🏠 Home</div>
        <div class="menu-item active">📝 Simulados</div>
        <div class="logout-btn" onclick="sair()">Sair</div>
    </div>

    <div class="main-content">
        <h2 style="color: var(--dark); font-size: 2em; margin-bottom: 10px;">O que vamos estudar hoje?</h2>
        <p style="color: #666;">Selecione uma disciplina para iniciar o simulado:</p>

        <div class="grid-selecao">
            <div class="card-materia" onclick="iniciarSimulado('Matematica')" style="border-color: #3498db;">
                <span class="icon-materia">📐</span>
                <h3>Matemática</h3>
                <p>Geometria, Álgebra e Lógica</p>
            </div>

            <div class="card-materia" onclick="iniciarSimulado('Portugues')" style="border-color: #9b59b6;">
                <span class="icon-materia">📚</span>
                <h3>Português</h3>
                <p>Gramática e Interpretação de Texto</p>
            </div>
        </div>
    </div>

    <script>
        function iniciarSimulado(materia) {
            localStorage.setItem('materiaFiltro', materia);
            window.location.href = "simulado.html";
        }
        
        function sair() {
            localStorage.removeItem('usuarioSalvo');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
