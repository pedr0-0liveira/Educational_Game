<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trilha de Estudo - Futuro Técnico</title>
    <style>
        /* O CSS deve ficar entre as tags <style> */
        :root { 
            --primary: #58cc02; 
            --primary-dark: #46a302;
            --dark: #2c3e50; 
            --locked: #e5e5e5;
            --locked-text: #afafaf;
        }
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: #f4f7f6; height: 100vh; }
        
        .sidebar { width: 260px; background: var(--dark); color: white; display: flex; flex-direction: column; padding: 20px; transition: 0.3s; position: relative; }
        .sidebar.collapsed { width: 70px; padding: 20px 10px; }
        .sidebar.collapsed span, .sidebar.collapsed h2 span { display: none; }
        
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        
        .trilha-mapa { display: flex; flex-direction: column; align-items: center; gap: 40px; margin-top: 30px; padding-bottom: 50px; width: 100%; max-width: 500px; }

        .nivel-item { position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .circulo {
            width: 80px; height: 80px; border-radius: 50%;
            background: white; border: 5px solid var(--locked);
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; cursor: pointer; transition: 0.3s; z-index: 2;
        }

        .nivel-item.liberado .circulo { border-color: var(--primary); background: var(--primary); color: white; }
        .nivel-item.bloqueado .circulo { background: var(--locked); color: var(--locked-text); cursor: not-allowed; }

        /* Linha que liga os círculos */
        .nivel-item:not(:last-child)::after {
            content: ''; position: absolute; top: 80px; width: 6px; height: 45px;
            background: var(--locked); z-index: 1;
        }
        .nivel-item.liberado:not(:last-child)::after { background: var(--primary); }
        
        .label-nivel { margin-top: 8px; font-weight: bold; color: var(--dark); }
        .btn-voltar { align-self: flex-start; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2 onclick="toggleSidebar()" style="cursor:pointer">🚀 <span>Menu</span></h2>
        <div onclick="window.location.href='dashboard.html'" style="cursor:pointer; padding:10px">🏠 <span>Home</span></div>
    </div>

    <div class="main-content">
        <button class="btn-voltar" onclick="window.location.href='selecao-materia.html'">⬅ Voltar</button>
        <h2 id="titulo-materia">Trilha de Estudo</h2>
        
        <div class="trilha-mapa" id="container-trilha"></div>
    </div>

    <script>
        const trilhas = {
            "Matematica": [
                { id: 1, nome: "Números", subtopico: "Sistema Decimal e Romano", xpNecessario: 0, icone: "🔢" },
                { id: 2, nome: "Operações", subtopico: "Naturais e Decimais", xpNecessario: 50, icone: "➕" },
                { id: 3, nome: "Frações", subtopico: "Frações", xpNecessario: 120, icone: "🍕" }
            ],
            "Portugues": [
                { id: 1, nome: "Acentuação", subtopico: "Acentuação Gráfica", xpNecessario: 0, icone: "✍️" },
                { id: 2, nome: "Ortografia", subtopico: "Ortografia", xpNecessario: 50, icone: "📖" }
            ]
        };

        function carregarPagina() {
            const materia = localStorage.getItem('materiaFiltro') || "Matematica";
            const xpUsuario = parseInt(localStorage.getItem('xpUsuario') || "0");
            
            document.getElementById('titulo-materia').innerText = `Trilha de ${materia}`;
            const container = document.getElementById('container-trilha');
            container.innerHTML = "";

            if (!trilhas[materia]) return;

            trilhas[materia].forEach(nivel => {
                const liberado = xpUsuario >= nivel.xpNecessario;
                const div = document.createElement('div');
                div.className = `nivel-item ${liberado ? 'liberado' : 'bloqueado'}`;
                
                div.innerHTML = `
                    <div class="circulo">${liberado ? nivel.icone : '🔒'}</div>
                    <div class="label-nivel">${nivel.nome}</div>
                `;

                if (liberado) {
                    div.onclick = () => {
                        localStorage.setItem('subtopicoFiltro', nivel.subtopico);
                        window.location.href = 'simulado.html';
                    };
                }
                container.appendChild(div);
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        window.onload = carregarPagina;
    </script>
</body>
</html>
