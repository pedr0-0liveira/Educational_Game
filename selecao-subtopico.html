<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Subtópicos - Meu Futuro Técnico</title>
    <style>
        :root { 
            --primary: #007bff; 
            --dark: #2c3e50; 
            --success: #28a745;
        }
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: #f4f7f6; height: 100vh; overflow: hidden; }
        
        /* --- SIDEBAR RETRÁTIL --- */
        .sidebar {
            width: 260px;
            background: var(--dark);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            flex-shrink: 0;
        }

        .sidebar.collapsed { width: 70px; padding: 20px 10px; }
        .sidebar.collapsed h2 span, .sidebar.collapsed .menu-item span { display: none; }
        
        .sidebar h2 { font-size: 1.2em; border-bottom: 1px solid #34495e; padding-bottom: 20px; text-align: center; white-space: nowrap; overflow: hidden; }
        
        .menu-item {
            padding: 15px; margin: 5px 0; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; white-space: nowrap; transition: 0.3s;
        }
        .menu-item i { min-width: 30px; text-align: center; font-style: normal; }
        .menu-item:hover { background: #34495e; }

        .toggle-btn {
            position: absolute; right: -12px; top: 25px; background: var(--primary);
            color: white; border: none; border-radius: 50%; width: 24px; height: 24px;
            cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center;
        }

        /* --- CONTEÚDO --- */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .grid-subtopicos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .card-sub { 
            background: white; padding: 25px; border-radius: 12px; text-align: center; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary);
        }
        .card-sub:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .btn-voltar { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('sidebarStatus') === 'closed') {
            document.write('<style>.sidebar { width: 70px !important; padding: 20px 10px !important; } .sidebar span, .sidebar h2 span { display: none !important; }</style>');
        }
    </script>

    <div class="sidebar" id="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        <h2>🚀 <span>Futuro Técnico</span></h2>
        <div class="menu-item" onclick="window.location.href='dashboard.html'">
            <i>🏠</i> <span>Home</span>
        </div>
        <div class="menu-item" onclick="window.location.href='selecao-materia.html'">
            <i>📝</i> <span>Simulados</span>
        </div>
    </div>

    <div class="main-content">
        <button class="btn-voltar" onclick="window.location.href='selecao-materia.html'">⬅ Voltar</button>
        <h2 id="titulo-materia">Subtópicos</h2>
        <p>Escolha um foco para o seu simulado:</p>

        <div class="grid-subtopicos" id="container-subtopicos"></div>
    </div>

<script>
    // --- LÓGICA DA SIDEBAR (Padronizada) ---
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        if (!sidebar) return;
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('sidebarStatus', sidebar.classList.contains('collapsed') ? 'closed' : 'open');
    }

    // --- LÓGICA DOS SUBTÓPICOS ---
    function carregarPagina() {
        // Recupera a matéria (Ex: Matematica ou Portugues)
        const materiaSelecionada = localStorage.getItem('materiaFiltro');
        
        if (!materiaSelecionada) {
            window.location.href = 'selecao-materia.html';
            return;
        }

        // Traduz para exibição bonita no título
        const titulos = { 'Matematica': 'Matemática', 'Portugues': 'Português' };
        document.getElementById('titulo-materia').innerText = `Subtópicos de ${titulos[materiaSelecionada] || materiaSelecionada}`;

        const subtopicos = {
            'Matematica': [
                { nome: 'Álgebra', desc: 'Equações e Funções' },
                { nome: 'Geometria', desc: 'Pitágoras e Áreas' },
                { nome: 'Aritmética', desc: 'Potências e Raízes' }
            ],
            'Portugues': [
                { nome: 'Gramática', desc: 'Análise Sintática' },
                { nome: 'Interpretação', desc: 'Compreensão de Texto' },
                { nome: 'Ortografia', desc: 'Acentuação e Escrita' }
            ]
        };

        const container = document.getElementById('container-subtopicos');
        if (!container) return;
        
        container.innerHTML = ""; 
        const lista = subtopicos[materiaSelecionada];

        if (lista) {
            lista.forEach(sub => {
                const div = document.createElement('div');
                div.className = 'card-sub';
                div.onclick = () => {
                    localStorage.setItem('subtopicoFiltro', sub.nome);
                    window.location.href = 'simulado.html';
                };
                div.innerHTML = `<h3>${sub.nome}</h3><p>${sub.desc}</p>`;
                container.appendChild(div);
            });
        }

        // Aplica estado da Sidebar
        if (localStorage.getItem('sidebarStatus') === 'closed') {
            const sb = document.getElementById('sidebar');
            if (sb) sb.classList.add('collapsed');
        }
    }

    // Usar addEventListener é mais seguro que window.onload
    window.addEventListener('load', carregarPagina);
</script>
</body>
</html>
